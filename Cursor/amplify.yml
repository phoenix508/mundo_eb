version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
appRoot: /
backend:
  phases:
    build:
      commands:
        - '# Execute build commands'
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
